<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#28428E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2a5e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7FE698;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" stroke="#7FE698" stroke-width="3"/>

  <!-- Tennis Ball -->
  <circle cx="100" cy="100" r="50" fill="#7FE698"/>

  <!-- Tennis Pattern -->
  <path d="M 55 65 Q 100 100 55 135" stroke="#28428E" stroke-width="4" fill="none"/>
  <path d="M 145 65 Q 100 100 145 135" stroke="#28428E" stroke-width="4" fill="none"/>

  <!-- "G" Letter -->
  <text x="100" y="115" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#28428E" text-anchor="middle">G</text>

  <!-- Arrow/Growth indicator -->
  <path d="M 150 45 L 165 30 L 180 45" stroke="#7FE698" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 165 30 L 165 65" stroke="#7FE698" stroke-width="4" stroke-linecap="round"/>
</svg>
